name: personaldatageneratorassignment

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80" 
    depends_on:
      - db
    environment:
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: server=db;port=3306;database=personal_data;user=root;password=root

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: personal_data
    ports:
      - "3308:3306"  
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: