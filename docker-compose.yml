name: personaldatageneratorassignment

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: server=db;port=3306;database=addresses;user=root;password=root

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: addresses
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./addresses.sql:/docker-entrypoint-initdb.d/01-addresses.sql:ro

volumes:
  db_data: